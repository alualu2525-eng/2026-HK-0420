<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI導遊導航App</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>

<style>
body { background:#0f172a; color:white;}
.card { background:rgba(255,255,255,0.08);}
</style>
</head>

<body>

<div id="app" class="max-w-md mx-auto p-4">

<h1 class="text-center font-bold mb-3">🤖 AI導遊</h1>

<div class="card p-3 rounded-xl">

<div class="text-sm mb-2">
第 {{ step+1 }} / {{ steps.length }} 步
</div>

<div class="bg-gray-700 h-2 rounded mb-3">
<div class="bg-green-400 h-2 rounded"
:style="{width:((step+1)/steps.length*100)+'%'}"></div>
</div>

<div class="mb-3">
{{ steps[step].text }}
</div>

<button @click="nav()" class="bg-blue-400 px-3 py-1 rounded">
🧭 開導航
</button>

<div class="flex justify-between mt-3">
<button @click="prev" class="bg-gray-600 px-2 rounded">⬅️</button>
<button @click="next" class="bg-gray-600 px-2 rounded">➡️</button>
</div>

</div>

<div class="mt-4 text-xs text-blue-300">
📍 目前位置：{{ userLat }}, {{ userLng }}
</div>

</div>

<script>
const app = Vue.createApp({
data(){
return{
step:0,
userLat:null,
userLng:null,

steps:[
{ text:"從灣仔A3出口出來直走", lat:22.277, lng:114.172 },
{ text:"右轉進莊士敦道，看到電車軌道", lat:22.278, lng:114.17 },
{ text:"搭叮叮車往西", lat:22.279, lng:114.168 },
{ text:"在租庇利街下車", lat:22.282, lng:114.158 },
{ text:"左轉步行2分鐘到半山扶梯", lat:22.283, lng:114.154 }
]
}
},

methods:{
next(){
if(this.step < this.steps.length-1){
this.step++
this.speak()
}
},
prev(){
if(this.step>0) this.step--
},

nav(){
let s = this.steps[this.step]
window.open(`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`)
},

// 🔊 語音
speak(){
let msg = new SpeechSynthesisUtterance(this.steps[this.step].text)
msg.lang = "zh-TW"
speechSynthesis.speak(msg)
},

// 📍 距離判斷
checkDistance(){
let s = this.steps[this.step]

let d = this.getDistance(
this.userLat, this.userLng,
s.lat, s.lng
)

if(d < 50){ // 50公尺內
this.next()
}
},

// 距離公式
getDistance(lat1, lon1, lat2, lon2){
let R = 6371e3
let φ1 = lat1*Math.PI/180
let φ2 = lat2*Math.PI/180
let Δφ = (lat2-lat1)*Math.PI/180
let Δλ = (lon2-lon1)*Math.PI/180

let a = Math.sin(Δφ/2)*Math.sin(Δφ/2)+
Math.cos(φ1)*Math.cos(φ2)*
Math.sin(Δλ/2)*Math.sin(Δλ/2)

let c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
return R*c
}

},

mounted(){

// 初始語音
this.speak()

// GPS追蹤
navigator.geolocation.watchPosition(pos=>{
this.userLat = pos.coords.latitude
this.userLng = pos.coords.longitude

this.checkDistance()
})

}
})

app.mount('#app')
</script>

</body>
</html>
